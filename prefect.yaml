# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: PREFECT
prefect-version: 3.7.3

# build section allows you to manage and build docker images
build:

# push section allows you to manage if and how this project
# is uploaded to remote locations
push:

# pull section allows you to provide instructions for cloning
# this project in remote locations
pull:
#- prefect.deployments.steps.set_working_directory:
 #   directory: C:\Users\paula.ceprian\PREFECT
- prefect.deployments.steps.git_clone:
    id: clone_step
    repository: https://github.com/pceprian/my_project_dbt.git
    branch: main  # O la rama en la que estés trabajando (ej. dev, master)
    # Si tu repositorio es privado, descomenta la línea de abajo apuntando al bloque que creamos:
    # credentials: "{{ prefect.blocks.github.mi-repositorio-github }}"
- prefect.deployments.steps.set_working_directory:
    directory: '{{ clone_step.directory }}'
- prefect.deployments.steps.pip_install_requirements:
    requirements_file: requirements.txt

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: demo-deplopyment
  version:
  tags: []
  concurrency_limit:
  description:
  entrypoint: hello.py:hello_world
  parameters: {}
  work_pool:
    name: process1
    work_queue_name: default
    job_variables: {}
  schedules: []
- name: deploy-job-1
  version:
  tags: []
  concurrency_limit:
  description:
  entrypoint: ejecutar_dbt.py:lanzar_primer_job
  parameters: {}
  work_pool:
    name: process1
    work_queue_name:
    job_variables: {}
  schedules:
  - cron: 10 10,22 * * 1-5
    timezone: UTC
    day_or: true
    active: true
- name: deploy-job-2
  version:
  tags: []
  concurrency_limit:
  description:
  entrypoint: ejecutar_dbt.py:lanzar_segundo_job
  parameters: {}
  work_pool:
    name: process1
    work_queue_name:
    job_variables: {}
  schedules:
  - cron: 10 12 * * 1-5
    timezone: UTC
    day_or: true
    active: true
- name: deploy-job-3
  version:
  tags: []
  concurrency_limit:
  description:
  entrypoint: ejecutar_dbt.py:lanzar_tercer_job
  parameters: {}
  work_pool:
    name: process1
    work_queue_name:
    job_variables: {}
  schedules:
  - cron: 10 14 * * 1-5
    timezone: UTC
    day_or: true
    active: true
