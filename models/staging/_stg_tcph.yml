version: 2

models:
  - name: stg_customers
    description: Staged customer data from our TCHP database.
    columns:
      - name: customer_id
        description: The primary key for customers.
        tests:
          - unique
          - not_null
      - name: customer_name
      - name: customer_nation_id
        description: Foreign key to stg_nation.nation_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_nation')
                field: nation_id
      - name: customer_phone
      - name: marketing_segment

  - name: stg_lineitem
    description: Staged incremental table for lines of items.
    columns:
      - name: lineitem_id
        description: The artificially created compound primary key for lines of items from our TCHP database. Created using dbt_utils surrogate key generation.
        tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_orders.order_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: part_id
        description: Foreign key to stg_parts.part_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_parts')
                field: part_id
      - name: supplier_id
        description: Foreign key to stg_supplier.supplier_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_supplier')
                field: supplier_id
      - name: line_status
        description: Status of the line of items.
      - name: lineitem_return_flag
        description: If an item is returned or not.

  - name: stg_nation
    description: Staged nation data from our TCHP database.
    columns:
      - name: nation_id
        description: The primary key for nations.
        tests:
          - unique
          - not_null
      - name: nation_name
      - name: region_id
        description: Foreign key to stg_region.region_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_region')
                field: region_id

  - name: stg_orders
    description: Staged order data from our TCHP database.
    columns:
      - name: order_id
        description: Primary key for orders.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_customers.customer_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_status
        description: Status of the orders.
      - name: order_date
        description: "The date when the order was done"
        tests:
          - not_null
          - is_valid_date_range:
              arguments:
                min_allowed_date: '1992-01-01'
      - name: order_priority_code
        description: "The parsed numeric code for order priority"
      - name: order_priority_name
        description: "The trimmed text name for order priority"

  - name: stg_parts
    description: Staged parts data from our TCHP database.
    columns:
      - name: part_id
        description: The primary key for parts.
        tests:
          - unique
          - not_null

  - name: stg_partsupp
    description: Staged parts and suppliers data from our TCHP database.
    columns:
      - name: part_supplier_id
        description: The primary key for part-supplier relationship. Created using dbt_utils surrogate key generation.
        tests:
          - unique
          - not_null
      - name: part_id
        description: Foreign key to stg_parts.part_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_parts')
                field: part_id
      - name: supplier_id
        description: Foreign key to stg_supplier.supplier_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_supplier')
                field: supplier_id
      - name: part_supplier_available_quantity

  - name: stg_region
    description: Staged region data from our TCHP database.
    columns:
      - name: region_id
        description: The primary key for regions.
        tests:
          - unique
          - not_null

  - name: stg_supplier
    description: Staged suppliers data from our TCHP database.
    columns:
      - name: supplier_id
        description: The primary key for suppliers.
        tests:
          - unique
          - not_null
      - name: supplier_name
      - name: supplier_nation_id
        description: Foreign key to stg_nation.nation_id.
        tests:
          - relationships:
              arguments:
                to: ref('stg_nation')
                field: nation_id

  - name: stg_date
    description: Staged date dbt table.
