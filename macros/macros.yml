version: 2

macros:
  - name: safe_divide_zero
    description: "Safely divide a numerator by a denominator where the denominator value might be zero."
    arguments:
      - name: numerator
        type: number
        description: "The field or value to be divided."
      - name: denominator
        type: number
        description: "The field or value to divide by. If zero, the result will be null."
  - name: insert_timestamp
    description: "Inserts the time when data was inserted into the data warehouse."
  - name: replace_null
    description: "Replaces null values or empty text fields by 'No Information' text. The goal is to get better reports."
    arguments:
      - name: column
        type: string
        description: "The text column or field to check for NULL or empty values."
      - name: replace_text
        type: string
        description: "The text to insert when a NULL is found. Default text is 'No Information'."
